<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHub - Skills Learning Platform</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <h1 style="text-align: center;">Login Form</h1>
    <h3 style="text-align: center;">Welcome Back User !!</h3>

    <form id="loginForm" action="homepage.html" method="get" onsubmit="return validateLoginForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required><br><br>

        <label for="email">E-mail:</label>
        <input type="text" id="email" placeholder="Enter your email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required><br>
        <a href="/home">Forgot password</a>
        <br><br>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        <br><br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" placeholder="Enter your phone number" required>
        <br><br>

        <input type="submit" value="Submit">
    </form>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        function validateLoginForm() {
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            const emailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
            if (!emailRegex.test(email)) {
                alert("Please enter a valid Gmail address.");
                return false;
            }

            const phonePattern = /^\d{10}$/;
            if (!phonePattern.test(phone)) {
                alert("Please enter a valid 10-digit phone number.");
                return false;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return false;
            }
            return true;
        }

        $(document).ready(function () {
            // Fade in headings and form
            $("h1").hide().fadeIn(1000);
            $("h3").hide().fadeIn(2000);
            $("form").hide().fadeIn(3000);

            // Submit button hover pulse effect
            $("input[type='submit']").hover(
                function () {
                    $(this).animate({ width: "105%" }, 200);
                },
                function () {
                    $(this).animate({ width: "70%" }, 200);
                }
            );
        });
    </script>
</body>

</html>
