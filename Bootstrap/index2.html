<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
 
<body>
    <div class="container">
        <h2>Bootstrap Form</h2>
        <form>

            <div class="row">
                <div class="mb-3 col-md-6">
                    <label class="form-label" for="email">Email:</label>
                    <input type="text" class="form-control" placeholder="Enter email" id="email">
                </div>

                <div class="mb-3 col-md-6">
                    <label for="password">Password:</label>
                    <input type="password" class="form-control" placeholder="Enter password" id="password">
                </div>
            </div>

            <div class="mb-3">
                <label for="ads">Address:</label>
                <input type="text" class="form-control-sm" placeholder="Enter address" id="ads">
            </div>

            <div class="mb-3">
                <label for="ads">Address:</label>
                <input type="text" class="form-control-lg" placeholder="Enter address" id="ads">
            </div>

            <div class="mb-3">
                <select class="form-select mb-3">
                    <option selected>Choose your number:</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>

            <div class="mb-3 form-check">
                <label for="agreebs" class="form-check-label">Agreed</label>
                <input type="checkbox" id="agreebs" class="form-check-input">
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
