<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Container Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container-sm">
        <!-- h1 class = start,center,end -->
        <h1 class="text-center">Bootstrap Container</h1>
        <p>This is an example of a Bootstrap container. Containers are used to pad the content inside of them, and there
            are two types of containers available in Bootstrap: fixed-width and fluid-width.</p>
    </div>

    <button class="btn btn-warning">Click</button>
    <br><br>
    <button type="button" class="btn btn-outline-success">
        Notifications
        <span class="badge text-bg-danger">
            100+
        </span>
    </button>
    <br><br>
    <button type="button" class="btn btn-outline-primary position-relative">
        Inbox
        <span class="badge text-bg-warning position-absolute top-0 start-100 translate-middle rounded-pill">
            100+
        </span>
    </button>
    <br><br>
    <button type="button" class="btn btn-outline-primary position-relative">
        Inbox
        <span
            class="bg-warning position-absolute top-0 start-100 translate-middle rounded-circle p-2 border border-dark"></span>
    </button>
    <br><br>
    <div class="btn-group">
        <button type="button" class="btn btn-outline-primary">Left</button>
        <button type="button" class="btn btn-outline-success">Center</button>
        <button type="button" class="btn btn-outline-warning">Right</button>
    </div>
    <br><br>
    <div class="btn-group-vertical">
        <input type="radio" class="btn-check" name="1" id="one">
        <label for="one" class="btn btn-outline-primary">Radio One</label>
        <input type="radio" class="btn-check" name="1" id="two">
        <label for="two" class="btn btn-outline-success">Radio Two</label>
        <input type="radio" class="btn-check" name="1" id="three">
        <label for="three" class="btn btn-outline-warning">Radio Three</label>
    </div>

    <div class="alert alert-primary">Congrats !</div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
